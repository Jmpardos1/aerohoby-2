@if (authService.isLoggedIn()) {
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" routerLink="/productos">AeroHobby</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/productos" routerLinkActive="active">Productos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/ordenes-compra" routerLinkActive="active">Órdenes de compra</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/reviews" routerLinkActive="active">Reseñas</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <a routerLink="/carrito" class="btn btn-outline-light btn-sm">
          <i class="bi bi-cart3"></i> Carrito
        </a>
        <span class="text-light small">{{ authService.getRol() }}</span>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Cerrar sesión</button>
      </div>
    </div>
  </nav>
}

<router-outlet />

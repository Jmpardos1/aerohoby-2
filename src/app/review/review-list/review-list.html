<div class="container mt-4">
  <h2 class="mb-4">Reseñas de Usuarios</h2>
  
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let review of reviews">
      <div class="card h-100 shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="card-title mb-0">{{ review.autor?.nombre || 'Usuario Anónimo' }}</h5>
            <span class="badge bg-warning text-dark"> {{ review.puntuacion }}/5</span>
          </div>
          <h6 class="card-subtitle mb-3 text-muted" style="font-size: 0.85rem;">
            Publicado el: {{ review.fecha }}
          </h6>
          <p class="card-text text-truncate">{{ review.contenido }}</p>
        </div>
        <div class="card-footer bg-white border-top-0">
          <button [routerLink]="['/reviews', review.id]" class="btn btn-outline-primary btn-sm w-100">
            Leer detalle completo
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="alert alert-info" *ngIf="reviews.length === 0">
    No hay reseñas disponibles en este momento.
  </div>
</div>

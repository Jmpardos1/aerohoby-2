<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Artículos</h2>
    @if (esExperto) {
      <button class="btn btn-dark btn-sm" (click)="abrirFormulario()">+ Nuevo artículo</button>
    }
  </div>

  @if (articulos.length === 0) {
    <p class="text-muted">No hay artículos publicados aún.</p>
  } @else {
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      @for (a of articulos; track a.id) {
        <div class="col">
          <div class="card h-100 shadow-sm articulo-card" (click)="irDetalle(a.id)" role="button">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title fw-semibold">{{ a.titulo }}</h5>
              <p class="card-text text-muted small flex-grow-1">{{ a.descripcion }}</p>
            </div>
            <div class="card-footer text-muted small d-flex justify-content-between align-items-center">
              <span>{{ a.autor?.nombre }}</span>
              <span>{{ a.fechaPublicacion }}</span>
              @if (esAdmin) {
                <button class="btn btn-outline-danger btn-sm py-0" (click)="eliminarArticulo($any(a.id), $event)">Eliminar</button>
              }
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>

@if (mostrarFormulario) {
  <button class="modal-backdrop-custom" (click)="mostrarFormulario = false"></button>
  <div class="modal-custom">
    <div class="card shadow-lg p-4" style="width: 520px;">
      <h5 class="fw-bold mb-4">Nuevo artículo</h5>
      <form [formGroup]="form" (ngSubmit)="publicar()">
        <div class="mb-3">
          <label class="form-label">Título</label>
          <input type="text" class="form-control" formControlName="titulo">
        </div>
        <div class="mb-3">
          <label class="form-label">Descripción breve</label>
          <input type="text" class="form-control" formControlName="descripcion">
        </div>
        <div class="mb-4">
          <label class="form-label">Contenido</label>
          <textarea class="form-control" rows="7" formControlName="contenido"></textarea>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-outline-secondary" (click)="mostrarFormulario = false">Cancelar</button>
          <button type="submit" class="btn btn-dark" [disabled]="form.invalid">Publicar</button>
        </div>
      </form>
    </div>
  </div>
}

<div class="container mt-4">
  <h2 class="mb-4">Listado de categorias</h2>

  <div *ngIf="isLoading" class="d-flex justify-content-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="ms-2">Cargando categorias...</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && categorias.length > 0" class="row g-4">
    <div *ngFor="let categoria of categorias" class="col-12 col-md-6 col-xl-4">
      <div class="card h-100 shadow-sm categoria-card">
        <div class="card-body">
          <h5 class="card-title mb-2">{{ categoria.nombre }}</h5>
          <p class="card-text text-muted mb-0">
            {{ categoria.descripcion }}
          </p>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && categorias.length === 0 && !errorMessage" class="alert alert-info">
    No hay categorias disponibles.
  </div>
</div>
